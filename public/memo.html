<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi chú - StudyBuddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/memo.css">

    <style>
        /* Override styles for standalone window */
        body {
            background-color: var(--bg-primary);
            overflow-y: auto;
            padding: 20px;
        }
        .solution-section {
            display: block;
            position: relative;
            height: auto;
            padding: 0;
            overflow: visible;
        }
        .memo-page-container {
            max-width: 100%;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="solution-section">
        <div class="memo-page-container">
            <div class="memo-page-header">
                <h1>📝 Ghi chú Nhanh</h1>
                <button class="btn btn-primary btn-sm" onclick="MemoPage.createMemo()">
                    ➕ Mới
                </button>
            </div>

            <div class="memo-editor" id="memo-editor" style="display: none;">
                <input type="text" id="memo-title" placeholder="Tiêu đề...">
                <textarea id="memo-content" placeholder="Nội dung ghi chú...&#10;&#10;Sẽ tự động lưu." style="min-height: 250px;"></textarea>
                <div class="memo-save-status" id="memo-save-status"></div>
            </div>

            <div class="memo-list-header" style="margin-top: 20px;">
                <h2 style="font-size: 16px;">📋 Danh sách</h2>
                <span class="memo-count" id="memo-count" style="font-size: 12px;">0 ghi chú</span>
            </div>
            <div class="memo-list" id="memo-list">
                <!-- Rendered by memo.js -->
            </div>
        </div>
    </div>

    <!-- Toast for standalone window -->
    <div id="toast" class="toast">
        <span id="toast-msg"></span>
    </div>

    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/pages/memo.js"></script>
    
    <script>
        // Initialize memo page directly
        window.addEventListener('DOMContentLoaded', () => {
            MemoPage.init();
        });
        
        // Listen for updates from other windows via IndexedDB (if needed)
        window.addEventListener('focus', () => {
            MemoPage.loadMemoList();
        });
    </script>
</body>
</html>
